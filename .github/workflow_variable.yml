name: Testing Workflow Variables

on:
  push:
     branches: [master ]
  workflow_dispatch

env:
  cloud: google-cloud

jobs:
  Greeting_job:
    runs-on: ubuntu-latest

    env:
      Greeting: Hello

    steps:
      - name: "Say Hello Simbu it's Monday"
        run: echo "$Greeting $First_Name is using $cloud"

        env:
          First_Name: simbu
